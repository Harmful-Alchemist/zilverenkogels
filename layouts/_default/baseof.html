<!doctype html>
<html lang="{{ or .Site.Language.Locale "nl-nl" }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    {{ partial "header.html" . }}
    <main class="container">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ partial "lightbox.html" . }}
    {{ with resources.Get "js/lightbox.js" }}
      {{ $js := . | minify | fingerprint }}
      <script src="{{ $js.RelPermalink }}" defer></script>
    {{ end }}
  </body>
</html>
