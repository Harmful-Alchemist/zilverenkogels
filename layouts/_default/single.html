{{ define "main" }}
  <article class="single">
    <h1>{{ .Title }}</h1>
    {{ if and (not .Date.IsZero) (ne .Section "") }}
      <p class="single-meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ partial "datum.html" .Date }}</time></p>
    {{ end }}
    <div class="prose">{{ .Content }}</div>
  </article>
{{ end }}
