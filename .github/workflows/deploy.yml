name: Bouw en publiceer site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Rechten die GitHub Pages nodig heeft
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwere push wint
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.0
    steps:
      - name: Hugo installeren (extended)
        run: |
          wget -O /tmp/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i /tmp/hugo.deb
      - name: Code ophalen
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Pages configureren
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Zet GitHub Pages (build-type "GitHub Actions") automatisch aan
          # zodat de eerste run niet faalt op een nog niet ingeschakelde Pages-site.
          enablement: true
      - name: Bouwen met Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Artifact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publiceren naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
